<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌊 Osmosis Simulator · Nina Explorer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: #F0F9FF; min-height: 100vh; }
  #root { max-width: 500px; margin: 0 auto; padding: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─── WATER EMOJI POOL ───────────────────────────────────────────────────────
const WATER_EMOJIS = ["👦","👧","🧒","👦","👧","🧒","👦","👧"];
const MINERALS_A   = [{id:"mA0",e:"🪑"},{id:"mA1",e:"🧸"}];
const MINERALS_B   = [
  {id:"mB0",e:"🪑"},{id:"mB1",e:"🧸"},{id:"mB2",e:"🏺"},{id:"mB3",e:"🪑"},
  {id:"mB4",e:"🧸"},{id:"mB5",e:"🏺"},{id:"mB6",e:"🪑"},{id:"mB7",e:"🧸"},
];
const ROOT_MINERALS = ["🔴","🔴","🔴","🔴","🔴","🔴","🔴","🔴"];
const SOIL_MINERALS = ["🟡","🟡","🟡"];

const initRoomWaters  = () => WATER_EMOJIS.map((emoji,id)=>({id,room:"A",emoji}));
const initSoilWaters  = () => Array.from({length:8},(_,i)=>({id:i,absorbed:false}));

const MSG = {
  info:    {bg:"#EFF6FF",bc:"#93C5FD",c:"#1E40AF"},
  success: {bg:"#F0FDF4",bc:"#86EFAC",c:"#15803D"},
  error:   {bg:"#FEF2F2",bc:"#FCA5A5",c:"#B91C1C"},
};

let pid = 0;

// ─── ROOM SIMULATOR ─────────────────────────────────────────────────────────
const ADV_MINERAL_LIMIT = 2; // max minerals allowed through in advanced mode

const initMinerals = () => ({
  A: [{id:"mA0",e:"🪑"},{id:"mA1",e:"🧸"}],
  B: [{id:"mB0",e:"🪑"},{id:"mB1",e:"🧸"},{id:"mB2",e:"🏺"},{id:"mB3",e:"🪑"},
      {id:"mB4",e:"🧸"},{id:"mB5",e:"🏺"},{id:"mB6",e:"🪑"},{id:"mB7",e:"🧸"}],
});

function RoomSim() {
  const [mode,     setMode]    = React.useState("basic"); // "basic" | "advanced"
  const [waters,   setWaters]  = React.useState(initRoomWaters);
  const [minerals, setMins]    = React.useState(initMinerals);
  const [selId,    setSelId]   = React.useState(null);
  const [selType,  setSelType] = React.useState(null); // "water" | "mineral"
  const [minSeep,  setMinSeep] = React.useState(0); // how many minerals have seeped
  const [msg,      setMsg]     = React.useState({t:"👆 Click a kid (💧 water) then click Room B →",type:"info"});

  const wA    = waters.filter(w=>w.room==="A");
  const wB    = waters.filter(w=>w.room==="B");
  const minsA = minerals.A;
  const minsB = minerals.B;
  const totA  = wA.length + minsA.length;
  const totB  = wB.length + minsB.length;
  const cA    = totA>0 ? Math.round((minsA.length/totA)*100) : 0;
  const cB    = totB>0 ? Math.round((minsB.length/totB)*100) : 0;
  const waterDone = wA.length === 0;

  const switchMode = m => {
    setMode(m);
    setWaters(initRoomWaters());
    setMins(initMinerals());
    setSelId(null); setSelType(null); setMinSeep(0);
    setMsg(m==="basic"
      ? {t:"👆 Click a kid emoji (💧 water molecule!) then click Room B →",type:"info"}
      : {t:"🔬 Advanced mode! Click water (👦👧) OR minerals (🪑🧸🏺) — see what really happens in biology!",type:"info"}
    );
  };

  const pickWater = (e,w) => {
    e.stopPropagation();
    if(selId===w.id&&selType==="water"){ setSelId(null); setSelType(null); setMsg({t:"Deselected.",type:"info"}); return; }
    setSelId(w.id); setSelType("water");
    setMsg({t:`${w.emoji} Water selected! Click Room B to pass through → `,type:"info"});
  };

  const pickMineral = (e, m, room) => {
    e.stopPropagation();
    if(mode==="basic"){
      setSelId(null); setSelType(null);
      setMsg({t:"🚫 Minerals (🪑🧸🏺) are TOO BIG! Only water kids can squeeze through the holes! (Basic mode = ideal membrane)",type:"error"});
      return;
    }
    // Advanced mode — minerals can be selected
    if(selId===m.id&&selType==="mineral"){ setSelId(null); setSelType(null); setMsg({t:"Deselected.",type:"info"}); return; }
    setSelId(m.id); setSelType("mineral");
    setMsg({t:`${m.e} Mineral selected! Try moving it through the membrane... 🔬`,type:"info"});
  };

  const clickRoom = room => {
    if(selId===null){ setMsg({t:"First select a water (👦👧🧒) or in Advanced mode a mineral (🪑🧸) too!",type:"info"}); return; }

    if(selType==="water"){
      const w = waters.find(x=>x.id===selId);
      if(w.room===room){ setMsg({t:"Same room! Click the OTHER side.",type:"info"}); return; }
      if(room==="A"){ setSelId(null); setSelType(null); setMsg({t:"❌ Wrong direction! Water → HIGH concentration (Room B)!",type:"error"}); return; }
      setWaters(prev=>prev.map(x=>x.id===selId?{...x,room:"B"}:x));
      setSelId(null); setSelType(null);
      const left=wA.length-1;
      setMsg(left===0
        ? {t:"🎉 All water moved to HIGH concentration! Osmosis complete!",type:"success"}
        : {t:`✅ Squeezed through! ${left} water molecules left.`,type:"success"});
      return;
    }

    if(selType==="mineral"){
      // Advanced: only allow A→B direction (minerals seep toward high conc too, slightly)
      const inA = minsA.find(x=>x.id===selId);
      const inB = minsB.find(x=>x.id===selId);
      const currentRoom = inA?"A":"B";
      if(currentRoom===room){ setMsg({t:"Same room! Try moving to the other side.",type:"info"}); return; }
      if(currentRoom==="B"&&room==="A"){
        setSelId(null); setSelType(null);
        setMsg({t:"⚠️ In real biology, minerals seep from LOW → HIGH too (same direction as water), not back out easily.",type:"error"});
        return;
      }
      if(minSeep >= ADV_MINERAL_LIMIT){
        setSelId(null); setSelType(null);
        setMsg({t:`🔬 Only ${ADV_MINERAL_LIMIT} minerals can seep through — real membranes allow a TINY amount. Most minerals are still blocked!`,type:"error"});
        return;
      }
      // Move mineral A→B (seeping)
      const mineral = minsA.find(x=>x.id===selId);
      setMins(prev=>({A:prev.A.filter(x=>x.id!==selId), B:[...prev.B,{...mineral,seep:true}]}));
      setMinSeep(s=>s+1);
      setSelId(null); setSelType(null);
      const remaining = ADV_MINERAL_LIMIT - minSeep - 1;
      setMsg({t:`⚗️ Mineral seeped through — slowly! Real biological membranes are NOT perfect. ${remaining>0?`${remaining} more can seep.`:"Max seepage reached — most minerals stay blocked!"}`,type:"info"});
    }
  };

  const reset = ()=>{
    setWaters(initRoomWaters()); setMins(initMinerals());
    setSelId(null); setSelType(null); setMinSeep(0);
    setMsg({t:`👆 ${mode==="basic"?"Click a kid emoji":"Click water or mineral"} to start!`,type:"info"});
  };

  const S = MSG[msg.type];

  const ItemBtn = ({emoji,onClick,selected,circle,bg,faded,seep}) => (
    <button onClick={onClick} style={{
      fontSize:20, background:selected?"#60A5FA":bg,
      border:`3px solid ${selected?"#1D4ED8":seep?"#F59E0B":"transparent"}`,
      borderRadius:circle?"50%":8, width:38,height:38,cursor:"pointer",
      display:"flex",alignItems:"center",justifyContent:"center",
      transform:selected?"scale(1.25)":"scale(1)",transition:"all 0.2s",
      boxShadow:selected?"0 0 14px #3B82F6":seep?"0 0 8px #F59E0B":"none",
      flexShrink:0, opacity:faded?0.45:1,
    }}>{emoji}</button>
  );

  return (
    <div>
      {/* Mode toggle */}
      <div style={{display:"flex",gap:6,marginBottom:12,background:"#F1F5F9",borderRadius:12,padding:4}}>
        {[["basic","📚 Basic","이상적 반투막"],["advanced","🔬 Advanced","실제 생물막"]].map(([k,label,sub])=>(
          <button key={k} onClick={()=>switchMode(k)} style={{
            flex:1,padding:"8px 4px",borderRadius:9,border:"none",cursor:"pointer",
            background:mode===k?(k==="basic"?"#3B82F6":"#8B5CF6"):"transparent",
            color:mode===k?"white":"#64748B",fontWeight:800,fontSize:13,
            fontFamily:"'Nunito',sans-serif",transition:"all 0.2s",lineHeight:1.3,
          }}>
            {label}<br/><span style={{fontSize:10,fontWeight:600,opacity:.85}}>{sub}</span>
          </button>
        ))}
      </div>

      {/* Mode explanation banner */}
      {mode==="basic" ? (
        <div style={{background:"#DBEAFE",border:"2px solid #93C5FD",borderRadius:10,padding:"8px 12px",fontSize:12,fontWeight:700,color:"#1E40AF",marginBottom:10}}>
          📚 <strong>Basic Mode — Ideal Membrane (이상적 반투막)</strong><br/>
          <span style={{fontWeight:400}}>Minerals are 100% blocked. Water only flows through. Good for learning the basic concept! · 미네랄은 완전 차단. 개념 학습용!</span>
        </div>
      ) : (
        <div style={{background:"#EDE9FE",border:"2px solid #A78BFA",borderRadius:10,padding:"8px 12px",fontSize:12,fontWeight:700,color:"#5B21B6",marginBottom:10}}>
          🔬 <strong>Advanced Mode — Real Biological Membrane (실제 생물막)</strong><br/>
          <span style={{fontWeight:400}}>Real membranes allow a TINY amount of minerals to seep through slowly! Try clicking a mineral 🪑 — max {ADV_MINERAL_LIMIT} can pass. · 실제 생물의 반투막은 소량의 미네랄도 통과시켜요! 미네랄(🪑🧸)을 클릭해보세요.</span>
        </div>
      )}

      {/* Message box */}
      <div style={{background:S.bg,border:`2px solid ${S.bc}`,borderRadius:12,padding:"10px 14px",marginBottom:10,color:S.c,fontSize:13,fontWeight:600,lineHeight:1.55}}>{msg.t}</div>

      {/* Concentration bars */}
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        {[["Room A 🟦",cA,"#3B82F6","#DBEAFE"],["Room B 🟨",cB,"#F59E0B","#FEF3C7"]].map(([label,conc,bar,bg])=>(
          <div key={label} style={{flex:1,background:bg,borderRadius:10,padding:"7px 10px"}}>
            <div style={{fontSize:10,fontWeight:800,color:"#374151",marginBottom:3}}>{label} · Mineral conc: <strong>{conc}%</strong></div>
            <div style={{background:"#E5E7EB",borderRadius:99,height:8,overflow:"hidden"}}>
              <div style={{width:`${conc}%`,height:"100%",background:bar,borderRadius:99,transition:"width 0.5s"}}/>
            </div>
          </div>
        ))}
      </div>

      {/* Advanced seepage counter */}
      {mode==="advanced" && (
        <div style={{background:"#FEF9C3",border:"2px solid #F59E0B",borderRadius:10,padding:"7px 12px",fontSize:12,fontWeight:700,color:"#92400E",marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
          <span>⚗️ Minerals seeped through:</span>
          <span style={{display:"flex",gap:4}}>
            {Array.from({length:ADV_MINERAL_LIMIT}).map((_,i)=>(
              <span key={i} style={{fontSize:18}}>{i<minSeep?"🪑":"⬜"}</span>
            ))}
          </span>
          <span style={{fontWeight:400,fontSize:11}}>/ {ADV_MINERAL_LIMIT} max · 소량만 통과!</span>
        </div>
      )}

      {/* Rooms */}
      <div style={{display:"flex",borderRadius:16,overflow:"hidden",border:`3px solid ${mode==="advanced"?"#A78BFA":"#CBD5E1"}`,minHeight:290}}>
        {/* Room A */}
        <div onClick={()=>clickRoom("A")} style={{flex:1,background:"#DBEAFE",padding:10,cursor:"pointer",display:"flex",flexWrap:"wrap",alignContent:"flex-start",gap:5,overflow:"auto"}}>
          <div style={{width:"100%",fontSize:10,fontWeight:800,color:"#1E40AF",marginBottom:3}}>ROOM A · Low 🟦</div>
          {minsA.map(m=><ItemBtn key={m.id} emoji={m.e} onClick={e=>pickMineral(e,m,"A")} selected={selId===m.id&&selType==="mineral"} circle={false} bg={mode==="advanced"?"#FDE68A":"#FEF3C7"} seep={false}/>)}
          {wA.map(w=><ItemBtn key={w.id} emoji={w.emoji} onClick={e=>pickWater(e,w)} selected={selId===w.id&&selType==="water"} circle={true} bg="#93C5FD"/>)}
        </div>

        {/* Membrane */}
        <div style={{width:32,background:mode==="advanced"?"#EDE9FE":"#E2E8F0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:3,borderLeft:`2px dashed ${mode==="advanced"?"#A78BFA":"#94A3B8"}`,borderRight:`2px dashed ${mode==="advanced"?"#A78BFA":"#94A3B8"}`}}>
          <div style={{fontSize:7,fontWeight:800,color:mode==="advanced"?"#5B21B6":"#64748B",writingMode:"vertical-rl",letterSpacing:1,marginBottom:4}}>반투막</div>
          {Array.from({length:7}).map((_,i)=>(
            <div key={i} style={{width:10,height:10,borderRadius:"50%",
              background:mode==="advanced"&&i<3?"#A78BFA":"#94A3B8",
              border:`1px solid ${mode==="advanced"?"#7C3AED":"#64748B"}`,
              boxShadow:mode==="advanced"&&i<3?"0 0 4px #8B5CF6":"none"}}/>
          ))}
          {mode==="advanced"&&<div style={{fontSize:8,color:"#7C3AED",fontWeight:800,marginTop:2}}>💜</div>}
        </div>

        {/* Room B */}
        <div onClick={()=>clickRoom("B")} style={{flex:1,background:"#FEF9C3",padding:10,cursor:"pointer",display:"flex",flexWrap:"wrap",alignContent:"flex-start",gap:5,overflow:"auto"}}>
          <div style={{width:"100%",fontSize:10,fontWeight:800,color:"#92400E",marginBottom:3}}>ROOM B · High 🟨</div>
          {minsB.map(m=><ItemBtn key={m.id} emoji={m.e} onClick={e=>pickMineral(e,m,"B")} selected={false} circle={false} bg={m.seep?"#FDE68A":"#FDE68A"} seep={m.seep}/>)}
          {wB.map(w=><ItemBtn key={w.id} emoji={w.emoji} onClick={e=>pickWater(e,w)} selected={selId===w.id&&selType==="water"} circle={true} bg="#93C5FD"/>)}
        </div>
      </div>

      {/* Legend */}
      <div style={{display:"flex",gap:8,marginTop:8,fontSize:11,fontWeight:700,color:"#475569",flexWrap:"wrap"}}>
        <span>👦👧🧒 = Water ✅</span>
        <span>{mode==="basic"?"🪑🧸🏺 = Minerals BLOCKED ❌":"🪑🧸🏺 = Minerals (tiny seep ⚗️)"}</span>
      </div>

      {/* Advanced science note */}
      {mode==="advanced" && minSeep>0 && (
        <div style={{marginTop:8,background:"#EDE9FE",border:"2px solid #A78BFA",borderRadius:10,padding:"8px 12px",fontSize:12,color:"#5B21B6",fontWeight:600,lineHeight:1.6}}>
          🔬 <strong>Real Science!</strong> Just like kimchi cabbage soaked in salt — even after rinsing with water, it still tastes salty. Some salt (solute) seeped through the cell membrane and stayed inside!<br/>
          <span style={{fontWeight:400,color:"#7C3AED"}}>소금에 절인 배추를 물로 씻어도 짠 이유 — 소금(용질)이 세포막을 통해 미세하게 스며들었기 때문이에요!</span>
        </div>
      )}

      {/* Completion */}
      {waterDone&&<div style={{marginTop:10,background:"#F0FDF4",border:"2px solid #22C55E",borderRadius:12,padding:"12px 14px",fontSize:14,fontWeight:800,color:"#15803D",textAlign:"center"}}>
        🎉 All water moved to HIGH concentration! Osmosis complete!<br/>
        <span style={{fontSize:12,fontWeight:600}}>삼투 완성! 모든 물 분자가 고농도 쪽으로 이동했어요!</span>
      </div>}

      <button onClick={reset} style={{width:"100%",padding:"11px",borderRadius:12,border:"none",background:"#64748B",color:"white",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"'Nunito',sans-serif",marginTop:10}}>🔄 Reset</button>
    </div>
  );
}

// ─── PLANT ROOT SIMULATOR ───────────────────────────────────────────────────
const W=380, H=510, GROUND_Y=215, STEM_X=190;
const INIT_ITEMS = () => [
  {id:0,type:"water",x:42,y:272,emoji:"💧"},{id:1,type:"water",x:102,y:298,emoji:"💧"},
  {id:2,type:"water",x:163,y:262,emoji:"💧"},{id:3,type:"water",x:234,y:288,emoji:"💧"},
  {id:4,type:"water",x:298,y:268,emoji:"💧"},{id:5,type:"water",x:344,y:316,emoji:"💧"},
  {id:6,type:"water",x:66,y:374,emoji:"💧"},{id:7,type:"water",x:314,y:368,emoji:"💧"},
  {id:8,type:"mineral",x:128,y:342,emoji:"🔴"},{id:9,type:"mineral",x:202,y:354,emoji:"🔴"},
  {id:10,type:"mineral",x:264,y:336,emoji:"🔴"},{id:11,type:"mineral",x:148,y:428,emoji:"🔴"},
  {id:12,type:"mineral",x:248,y:418,emoji:"🔴"},
].map(i=>({...i,state:"soil"}));
const TOTAL=13;

function PlantSim() {
  const [items,     setItems]     = React.useState(INIT_ITEMS);
  const [particles, setParticles] = React.useState([]);
  const [health,    setHealth]    = React.useState(0);
  const [msg,       setMsg]       = React.useState({t:"👆 Click 💧 water or 🔴 minerals in the soil — watch them travel up!",type:"info"});

  const absorbedW = items.filter(i=>i.type==="water"  &&i.state==="absorbed").length;
  const absorbedM = items.filter(i=>i.type==="mineral"&&i.state==="absorbed").length;
  const totalAbs  = absorbedW+absorbedM;
  const lGreen    = health>10?"#22C55E":"#A7F3D0";
  const dGreen    = health>10?"#16A34A":"#A7F3D0";
  const showFlower= health>65;
  const budR      = 8+health*0.13;

  const onItemClick = item => {
    if(item.state!=="soil") return;
    setItems(prev=>prev.map(i=>i.id===item.id?{...i,state:"moving",x:STEM_X,y:GROUND_Y}:i));
    setMsg({t:item.type==="water"?"💧 Water moving to root! Roots = HIGH concentration → osmosis!":"🔴 Mineral moving to root!",type:"info"});
    setTimeout(()=>{
      setItems(prev=>prev.map(i=>i.id===item.id?{...i,state:"absorbed"}:i));
      setHealth(prev=>Math.min(100,prev+Math.round(100/TOTAL)));
      const id=pid++;
      setParticles(prev=>[...prev,{id,emoji:item.emoji}]);
      setTimeout(()=>setParticles(prev=>prev.filter(p=>p.id!==id)),2000);
      const left=TOTAL-totalAbs-1;
      setMsg({t:left<=0?"🌸 All nutrients absorbed! Osmosis complete! 🌸":`✅ Absorbed! ${left} more to go!`,type:left<=0?"success":"success"});
    },950);
  };
  const reset=()=>{ setItems(INIT_ITEMS()); setParticles([]); setHealth(0); setMsg({t:"👆 Click 💧 water or 🔴 minerals in the soil!",type:"info"}); pid=0; };

  const S=MSG[msg.type];
  return (
    <div>
      <style>{`
        @keyframes riseUp{0%{transform:translateY(0);opacity:1}85%{opacity:1}100%{transform:translateY(-${GROUND_Y-52}px);opacity:0}}
        @keyframes soilGlow{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,.45)}50%{box-shadow:0 0 0 5px rgba(59,130,246,0)}}
        @keyframes mineralGlow{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.45)}50%{box-shadow:0 0 0 5px rgba(239,68,68,0)}}
      `}</style>
      <div style={{background:S.bg,border:`2px solid ${S.bc}`,borderRadius:12,padding:"10px 14px",marginBottom:10,color:S.c,fontSize:13,fontWeight:600,lineHeight:1.55}}>{msg.t}</div>
      <div style={{background:"#DCFCE7",border:"2px solid #22C55E",borderRadius:10,padding:"8px 12px",fontSize:12,fontWeight:700,color:"#15803D",marginBottom:10}}>
        💡 Click 💧 water and 🔴 minerals in the SOIL to absorb into roots!<br/>
        <span style={{fontWeight:400}}>토양의 물과 미네랄을 클릭해서 뿌리로 흡수시키세요!</span>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        {[["💧 Water",absorbedW,8,"#3B82F6","#DBEAFE"],["🔴 Minerals",absorbedM,5,"#EF4444","#FEE2E2"]].map(([label,val,max,c,bg])=>(
          <div key={label} style={{flex:1,background:bg,borderRadius:10,padding:"7px 10px"}}>
            <div style={{fontSize:11,fontWeight:800,color:"#374151"}}>{label}: {val}/{max}</div>
            <div style={{background:"#E5E7EB",borderRadius:99,height:6,marginTop:3}}>
              <div style={{width:`${(val/max)*100}%`,height:"100%",background:c,borderRadius:99,transition:"width 0.5s"}}/>
            </div>
          </div>
        ))}
      </div>
      <div style={{position:"relative",width:"100%",height:H,borderRadius:16,overflow:"hidden",border:"3px solid #CBD5E1",boxShadow:"0 6px 24px rgba(0,0,0,.12)"}}>
        <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} style={{position:"absolute",top:0,left:0,pointerEvents:"none"}}>
          <defs>
            <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#BAE6FD"/><stop offset="100%" stopColor="#E0F2FE"/></linearGradient>
            <linearGradient id="soilG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#A16207" stopOpacity=".9"/><stop offset="100%" stopColor="#78350F"/></linearGradient>
            <linearGradient id="stemG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#16A34A"/><stop offset="50%" stopColor="#4ADE80"/><stop offset="100%" stopColor="#16A34A"/></linearGradient>
            <radialGradient id="sunG"><stop offset="0%" stopColor="#FDE68A"/><stop offset="100%" stopColor="#FCD34D"/></radialGradient>
          </defs>
          <rect x="0" y="0" width={W} height={GROUND_Y} fill="url(#skyG)"/>
          <circle cx="332" cy="36" r="25" fill="url(#sunG)"/>
          {[0,45,90,135,180,225,270,315].map(a=><line key={a} x1={332+Math.cos(a*Math.PI/180)*29} y1={36+Math.sin(a*Math.PI/180)*29} x2={332+Math.cos(a*Math.PI/180)*42} y2={36+Math.sin(a*Math.PI/180)*42} stroke="#FCD34D" strokeWidth="2.5" strokeLinecap="round"/>)}

          <path d={`M${STEM_X} ${GROUND_Y+2} C${STEM_X} ${GROUND_Y+70} ${STEM_X} ${GROUND_Y+140} ${STEM_X} ${GROUND_Y+275}`} stroke="#D97706" strokeWidth="11" fill="none" strokeLinecap="round"/>
          <path d={`M${STEM_X} ${GROUND_Y+35} C${STEM_X-35} ${GROUND_Y+68} ${STEM_X-90} ${GROUND_Y+100} ${STEM_X-130} ${GROUND_Y+138} C${STEM_X-158} ${GROUND_Y+168} ${STEM_X-168} ${GROUND_Y+202} ${STEM_X-158} ${GROUND_Y+232}`} stroke="#D97706" strokeWidth="8" fill="none" strokeLinecap="round"/>

          <path d={`M${STEM_X+122} ${GROUND_Y+142} C${STEM_X+142} ${GROUND_Y+176} ${STEM_X+138} ${GROUND_Y+214} ${STEM_X+130} ${GROUND_Y+250}`} stroke="#B45309" strokeWidth="4.5" fill="none" strokeLinecap="round"/>
          <path d={`M${STEM_X+148} ${GROUND_Y+235} C${STEM_X+168} ${GROUND_Y+262} ${STEM_X+162} ${GROUND_Y+290} ${STEM_X+150} ${GROUND_Y+286}`} stroke="#B45309" strokeWidth="3.5" fill="none" strokeLinecap="round"/>
          <path d={`M${STEM_X} ${GROUND_Y+215} C${STEM_X-28} ${GROUND_Y+245} ${STEM_X-32} ${GROUND_Y+275} ${STEM_X-22} ${GROUND_Y+278}`} stroke="#B45309" strokeWidth="3.5" fill="none" strokeLinecap="round"/>
          <path d={`M${STEM_X} ${GROUND_Y+215} C${STEM_X+28} ${GROUND_Y+245} ${STEM_X+32} ${GROUND_Y+275} ${STEM_X+22} ${GROUND_Y+278}`} stroke="#B45309" strokeWidth="3.5" fill="none" strokeLinecap="round"/>
          {[[STEM_X,GROUND_Y+275],[STEM_X-158,GROUND_Y+232],[STEM_X-162,GROUND_Y+284],[STEM_X-138,GROUND_Y+248],[STEM_X+148,GROUND_Y+235],[STEM_X+150,GROUND_Y+286],[STEM_X+130,GROUND_Y+250],[STEM_X-22,GROUND_Y+278],[STEM_X+22,GROUND_Y+278]].map(([cx,cy],i)=>(
            <g key={i}><circle cx={cx} cy={cy} r="6" fill="#FCD34D" stroke="#F59E0B" strokeWidth="2"/>

              <line x1={cx+7} y1={cy+2} x2={cx+15} y2={cy+13} stroke="#FDE68A" strokeWidth="1.5" strokeLinecap="round"/>
              <line x1={cx} y1={cy+6} x2={cx} y2={cy+18} stroke="#FDE68A" strokeWidth="1.5" strokeLinecap="round"/>
            </g>
          ))}
          {/* Stem */}
          <rect x={STEM_X-8} y={52} width="16" height={GROUND_Y-52} rx="8" fill="url(#stemG)"/>
          <rect x={STEM_X-2} y={56} width="5" height={GROUND_Y-58} rx="2.5" fill="#86EFAC" opacity=".55"/>

          <ellipse cx={STEM_X+62} cy={GROUND_Y-48} rx={62} ry={23} fill={dGreen} transform={`rotate(30 ${STEM_X+62} ${GROUND_Y-48})`}/>

          <ellipse cx={STEM_X+50} cy={GROUND_Y-100} rx={50} ry={19} fill={health>30?lGreen:"#A7F3D0"} transform={`rotate(25 ${STEM_X+50} ${GROUND_Y-100})`}/>
          {showFlower ? (
            <>
              {[0,51,103,154,206,257,309].map(a=>(
                <ellipse key={a} cx={STEM_X-8+Math.cos(a*Math.PI/180)*24} cy={68+Math.sin(a*Math.PI/180)*24} rx="12" ry="8"
                  fill="#FEF9C3" stroke="#F59E0B" strokeWidth="1.5"
                  transform={`rotate(${a} ${STEM_X-8+Math.cos(a*Math.PI/180)*24} ${68+Math.sin(a*Math.PI/180)*24})`}
                  opacity={Math.min(1,(health-65)/35)}/>
              ))}
              <circle cx={STEM_X-8} cy={68} r="14" fill="#FCD34D" stroke="#F59E0B" strokeWidth="2" opacity={Math.min(1,(health-65)/35)}/>
            </>
          ):<circle cx={STEM_X-8} cy={62} r={budR} fill={health>25?"#22C55E":"#A7F3D0"} stroke="#16A34A" strokeWidth="1.5"/>}
          <rect x="0" y={GROUND_Y-3} width={W} height={6} fill="#92400E"/>
          <text x="10" y={GROUND_Y-8} fontSize="9" fontWeight="800" fill="#0369A1" fontFamily="Nunito,sans-serif">↑ Above ground (지상)</text>
          <text x="10" y={GROUND_Y+16} fontSize="9" fontWeight="800" fill="#FDE68A" fontFamily="Nunito,sans-serif">↓ Underground soil (지하 토양)</text>
          <rect x={W-142} y={GROUND_Y+22} width={137} height={42} rx="7" fill="#78350F" fillOpacity=".72"/>
          <text x={W-136} y={GROUND_Y+36} fontSize="9" fontWeight="800" fill="#FDE68A" fontFamily="Nunito,sans-serif">Soil = LOW concentration</text>
          <text x={W-136} y={GROUND_Y+50} fontSize="9" fill="#FCD34D" fontFamily="Nunito,sans-serif">저농도 (물 분자가 더 많음)</text>
          <rect x="6" y={GROUND_Y-60} width={137} height={42} rx="7" fill="#166534" fillOpacity=".78"/>
          <text x="12" y={GROUND_Y-44} fontSize="9" fontWeight="800" fill="#86EFAC" fontFamily="Nunito,sans-serif">Roots = HIGH concentration</text>
          <text x="12" y={GROUND_Y-30} fontSize="9" fill="#4ADE80" fontFamily="Nunito,sans-serif">고농도 (미네랄이 더 많음)</text>
          <rect x={W-112} y="6" width="106" height="30" rx="9" fill="rgba(21,128,61,.82)"/>
          <text x={W-104} y="26" fontSize="11" fontWeight="800" fill="white" fontFamily="Nunito,sans-serif">🌱 Health: {health}%</text>
        </svg>
        {items.map(item=>{
          if(item.state==="absorbed") return null;
          const isMoving=item.state==="moving";
          return (
            <button key={item.id} onClick={()=>!isMoving&&onItemClick(item)} style={{
              position:"absolute",left:(isMoving?STEM_X:item.x)-18,top:(isMoving?GROUND_Y-2:item.y)-18,
              width:36,height:36,fontSize:20,background:"rgba(255,255,255,.92)",
              border:`2.5px solid ${item.type==="water"?"#3B82F6":"#EF4444"}`,borderRadius:"50%",
              cursor:isMoving?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",
              transition:isMoving?"left 0.85s cubic-bezier(.4,0,.2,1),top 0.85s cubic-bezier(.4,0,.2,1)":"transform 0.1s",
              zIndex:10,animation:!isMoving?`${item.type==="water"?"soilGlow":"mineralGlow"} 2.2s infinite`:"none",
              boxShadow:`0 2px 8px ${item.type==="water"?"rgba(59,130,246,.3)":"rgba(239,68,68,.3)"}`,
            }}>{item.emoji}</button>
          );
        })}
        {particles.map(p=>(
          <div key={p.id} style={{position:"absolute",left:STEM_X-14,top:GROUND_Y-14,fontSize:18,zIndex:20,pointerEvents:"none",animation:"riseUp 1.85s ease-in forwards"}}>{p.emoji}</div>
        ))}
      </div>
      {totalAbs===TOTAL&&<div style={{marginTop:10,background:"#DCFCE7",border:"2px solid #22C55E",borderRadius:12,padding:"12px",fontSize:14,fontWeight:800,color:"#15803D",textAlign:"center"}}>
        🌸 All nutrients absorbed! The plant is fully nourished through osmosis! 🌸<br/>
        <span style={{fontSize:12,fontWeight:600}}>삼투로 식물이 완전히 건강해졌어요!</span>
      </div>}
      <button onClick={reset} style={{width:"100%",padding:"11px",borderRadius:12,border:"none",background:"#64748B",color:"white",fontWeight:800,fontSize:14,cursor:"pointer",fontFamily:"'Nunito',sans-serif",marginTop:10}}>🔄 Reset</button>
    </div>
  );
}

        <span style={{color:"#0891B2",fontWeight:400}}>물은 고농도로 이동 · 미네랄은 막혀요 · 균형이 맞을 때까지 이동</span>

      <div style={{textAlign:"center",marginTop:10,fontSize:11,color:"#94A3B8",fontWeight:600}}>© Nina Edu · @nina_edu_talk · Nina Explorer Science</div>
